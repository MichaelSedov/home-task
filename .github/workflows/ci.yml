name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-secret-placeholder-minimum-32-chars' }}
  # LHCI runs against http://localhost:4173, so canonical/hreflang must match.
  PUBLIC_ORIGIN: http://localhost:4173

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 1. Lint + format ──────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 2. Type-check ─────────────────────────────────────────────────────
      - name: Type-check
        run: npx svelte-kit sync && npx tsc --noEmit

      # ── 3. svelte-check ───────────────────────────────────────────────────
      - name: svelte-check
        run: npx svelte-check

      # ── 4. Unit tests ─────────────────────────────────────────────────────
      - name: Unit tests
        run: npm run test:unit

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Bundle size (blocks PR on regression) ──────────────────────────
      - name: Bundle size check
        run: npm run size

      # ── 7. Playwright install ─────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── 8. E2E tests ──────────────────────────────────────────────────────
      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ── 9. Lighthouse CI (blocks PR on regression) ────────────────────────
      - name: Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
