<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Fonts are self-hosted via @fontsource and bundled with layout.css.
		     No third-party request on the critical path. -->

		%sveltekit.head%
		<!-- Inline theme bootstrap — runs before paint to prevent FOUC -->
		<script>
			(function () {
				try {
					var saved = document.cookie.match(/theme=([^;]+)/);
					var theme = saved
						? saved[1]
						: matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (_) {}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- skip link for keyboard users -->
		<a
			href="#main-content"
			class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:rounded-md focus:bg-[var(--accent)] focus:px-4 focus:py-2 focus:text-white"
		>
			Skip to content
		</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
