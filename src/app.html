<!doctype html>
<html lang="%sveltekit.lang%" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
		/>
		%sveltekit.head%
		<!-- Inline theme bootstrap — runs before paint to prevent FOUC -->
		<script>
			(function () {
				try {
					var saved = document.cookie.match(/theme=([^;]+)/);
					var theme = saved ? saved[1] : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (_) {}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- skip link for keyboard users -->
		<a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-[var(--accent)] focus:text-white focus:rounded-md">
			Skip to content
		</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
